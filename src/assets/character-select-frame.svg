<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 150"
  preserveAspectRatio="none"
>
  <defs>
    <!-- Gradiente metálico claro -->
    <linearGradient id="frameMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4edd0"/>
      <stop offset="40%" stop-color="#d8c17a"/>
      <stop offset="70%" stop-color="#b38b3f"/>
      <stop offset="100%" stop-color="#7a5220"/>
    </linearGradient>

    <!-- Máscara do centro vazado -->
    <mask id="frameCutout">
      <rect width="100%" height="100%" fill="white"/>
      <rect x="10%" y="10%" width="80%" height="80%" fill="black"/>
    </mask>
  </defs>

  <!-- BASE DO FRAME -->
  <g mask="url(#frameCutout)">
    <!-- Sombra externa -->
    <rect width="100%" height="100%" fill="url(#frameDark)"/>

    <!-- Corpo principal -->
    <rect
      x="2%"
      y="2%"
      width="96%"
      height="96%"
      rx="3%"
      ry="3%"
      fill="url(#frameMetal)"
    />

    <!-- Linha interna -->
    <rect
      x="6%"
      y="6%"
      width="88%"
      height="88%"
      rx="2%"
      ry="2%"
      fill="none"
      stroke="#fff4c9"
      stroke-width="1.2%"
    />
  </g>

  <!-- DETALHE SUPERIOR (PLACA) -->
  <g fill="#fff4c9">
    <rect x="35%" y="2%" width="30%" height="2%"/>
    <rect x="38%" y="4%" width="24%" height="1%"/>
  </g>

  <!-- DETALHE INFERIOR (BASE) -->
  <g fill="#cfa85a">
    <rect x="30%" y="96%" width="40%" height="2%"/>
  </g>

  <!-- MARCAS LATERAIS -->
  <g fill="#fff4c9">
    <rect x="3%" y="20%" width="2%" height="10%"/>
    <rect x="95%" y="20%" width="2%" height="10%"/>

    <rect x="3%" y="70%" width="2%" height="10%"/>
    <rect x="95%" y="70%" width="2%" height="10%"/>
  </g>
</svg>
