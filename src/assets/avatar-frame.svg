<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="25%" stop-color="#f1d46a"/>
      <stop offset="55%" stop-color="#c89a2b"/>
      <stop offset="80%" stop-color="#f7e58b"/>
      <stop offset="100%" stop-color="#8a5a10"/>
    </linearGradient>

    <linearGradient id="innerMetal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a1606"/>
      <stop offset="100%" stop-color="#6b4514"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <mask id="ring">
      <rect width="256" height="256" fill="black"/>
      <!-- aro externo -->
      <rect x="0" y="0" width="256" height="256" rx="28" fill="white"/>
      <!-- recorte central -->
      <rect x="22" y="22" width="212" height="212" rx="18" fill="black"/>
    </mask>
  </defs>

  <!-- ARO DOURADO -->
  <g filter="url(#shadow)" mask="url(#ring)">
    <rect x="0" y="0" width="256" height="256" rx="28" fill="url(#gold)"/>
    <rect x="0" y="0" width="256" height="256" rx="28"
          fill="none" stroke="#3b2408" stroke-width="4"/>
  </g>

  <!-- ANEL INTERNO -->
  <rect
    x="18"
    y="18"
    width="220"
    height="220"
    rx="20"
    fill="none"
    stroke="url(#innerMetal)"
    stroke-width="10"
  />

  <!-- CANTOS -->
  <g>
    <circle cx="32" cy="32" r="5" fill="#ffd15a" stroke="#3b2408" stroke-width="2"/>
    <circle cx="224" cy="32" r="5" fill="#ffd15a" stroke="#3b2408" stroke-width="2"/>
    <circle cx="32" cy="224" r="5" fill="#ffd15a" stroke="#3b2408" stroke-width="2"/>
    <circle cx="224" cy="224" r="5" fill="#ffd15a" stroke="#3b2408" stroke-width="2"/>
  </g>
</svg>
